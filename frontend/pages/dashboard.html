<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWM — Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <div class="navbar">
        <h1>📊 Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container page-content">

        <div class="card" style="padding:14px;">
            <div style="display:flex;gap:10px;align-items:center;">
                <select id="project-select"
                    style="flex:1;padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;"
                    onchange="loadDashboard()">
                    <option value="">-- Select Project --</option>
                </select>
                <input type="date" id="dash-date"
                    style="padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;"
                    onchange="loadDashboard()">
            </div>
        </div>

        <div id="dashboard-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Select a project to load dashboard</p>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="collection.html">
            <span class="nav-icon">📝</span>Entry
        </a>
        <a href="missing.html">
            <span class="nav-icon">⚠️</span>Missing
        </a>
        <a href="dashboard.html" class="active">
            <span class="nav-icon">📊</span>Dashboard
        </a>
    </nav>

    <script src="../js/api.js"></script>
    <script>
        if (!getToken()) window.location.href = 'login.html';

        document.getElementById('dash-date').value = new Date().toISOString().split('T')[0];

        async function loadProjects() {
            const projects = await getProjects();
            const sel = document.getElementById('project-select');
            projects.forEach(p => {
                sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        }

        async function loadDashboard() {
            const projectId = document.getElementById('project-select').value;
            const date = document.getElementById('dash-date').value;
            if (!projectId) return;

            document.getElementById('dashboard-content').innerHTML =
                '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

            try {
                const [daily, weekly] = await Promise.all([
                    getDailyDashboard(projectId, date),
                    getWeeklyDashboard(projectId)
                ]);
                renderDashboard(daily, weekly);
            } catch (e) {
                document.getElementById('dashboard-content').innerHTML =
                    '<div class="alert alert-error">Failed to load dashboard.</div>';
            }
        }

        function renderDashboard(daily, weekly) {
            const wasteColors = {
                dry: '#1565c0', wet: '#00695c',
                mixed: '#e65100', hazardous: '#b71c1c'
            };

            const wasteHtml = Object.entries(daily.waste_distribution).map(([type, count]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <span style="font-size:14px;text-transform:capitalize;">${type}</span>
                <div style="flex:1;margin:0 12px;background:#f0f0f0;border-radius:6px;height:10px;overflow:hidden;">
                    <div style="width:${daily.collected ? (count / daily.collected * 100) : 0}%;
                                height:100%;background:${wasteColors[type]};border-radius:6px;"></div>
                </div>
                <span style="font-size:14px;font-weight:600;">${count}</span>
            </div>
        `).join('');

            const weeklyHtml = weekly.weekly_trend.map(d => {
                const h = Math.round((d.coverage_pct / 100) * 80);
                return `
                <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
                    <div style="font-size:11px;font-weight:600;color:#2e7d32;">${d.coverage_pct}%</div>
                    <div style="width:100%;display:flex;align-items:flex-end;justify-content:center;height:80px;">
                        <div style="width:70%;background:#4caf50;border-radius:4px 4px 0 0;height:${h}px;min-height:4px;"></div>
                    </div>
                    <div style="font-size:10px;color:#9e9e9e;margin-top:4px;">
                        ${new Date(d.date).toLocaleDateString('en-IN', { weekday: 'short' })}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('dashboard-content').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="value">${daily.total_households}</div>
                    <div class="label">Total Houses</div>
                </div>
                <div class="stat-card">
                    <div class="value">${daily.collected}</div>
                    <div class="label">Collected</div>
                </div>
                <div class="stat-card">
                    <div class="value" style="color:#c62828;">${daily.missing}</div>
                    <div class="label">Missing</div>
                </div>
                <div class="stat-card">
                    <div class="value" style="color:${daily.coverage_pct >= 80 ? '#2e7d32' : '#f57f17'};">
                        ${daily.coverage_pct}%
                    </div>
                    <div class="label">Coverage</div>
                </div>
            </div>

            <div class="coverage-bar">
                <div class="fill" style="width:${daily.coverage_pct}%"></div>
            </div>

            <div class="card">
                <h2>Waste Type Distribution</h2>
                ${wasteHtml || '<p style="color:#9e9e9e;font-size:14px;">No data for this date.</p>'}
            </div>

            <div class="card">
                <h2>7-Day Trend</h2>
                <div style="display:flex;gap:4px;align-items:flex-end;">
                    ${weeklyHtml}
                </div>
            </div>
        `;
        }

        loadProjects();
    </script>
</body>

</html>
