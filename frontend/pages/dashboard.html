<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWM — Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="navbar">
        <h1>📊 Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container page-content">

        <div class="card" style="padding:14px;">
            <div style="display:flex;gap:10px;align-items:center;">
                <select id="project-select"
                    style="flex:1;padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;"
                    onchange="loadDashboard()">
                    <option value="">-- Select Project --</option>
                </select>
                <input type="date" id="dash-date"
                    style="padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:15px;"
                    onchange="loadDashboard()">
            </div>
        </div>

        <div id="dashboard-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Select a project to load dashboard</p>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="collection.html">
            <span class="nav-icon">📝</span>Entry
        </a>
        <a href="missing.html">
            <span class="nav-icon">⚠️</span>Missing
        </a>
        <a href="dashboard.html" class="active">
            <span class="nav-icon">📊</span>Dashboard
        </a>
    </nav>

<script src="../js/api.js"></script>
<script>
    // 🔐 Auth + Role check
    const user = getUser();

    if (!getToken() || !user) {
        window.location.href = 'login.html';
    } else if (user.role === 'field_worker') {
        alert("Access denied. Only managers can view dashboard.");
        window.location.href = 'collection.html';
    }

    // 🎨 Background function (ADDED safely)
    function createBackground(theme = 'green') {
        const container = document.querySelector('.bg-animation');
        if (!container) return;

        const icons = ['♻️', '🗑️', '🌱', '🌍', '💚', '🏠', '⚠️'];

        const colors = {
            green: '#2e7d32',
            orange: '#f57c00'
        };

        for (let i = 0; i < 20; i++) {
            const span = document.createElement('span');
            span.innerText = icons[Math.floor(Math.random() * icons.length)];

            span.style.left = Math.random() * 100 + 'vw';
            span.style.animationDuration = (8 + Math.random() * 5) + 's';
            span.style.fontSize = (18 + Math.random() * 20) + 'px';
            span.style.color = colors[theme];

            container.appendChild(span);
        }
    }

    // 📅 Set date
    document.getElementById('dash-date').value =
        new Date().toISOString().split('T')[0];

    // 📦 Load projects
    async function loadProjects() {
        try {
            const projects = await getProjects();
            const sel = document.getElementById('project-select');

            // ✅ FIX: reset dropdown
            sel.innerHTML = '<option value="">-- Select Project --</option>';

            projects.forEach(p => {
                sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });

        } catch (err) {
            console.error("Project load error:", err);
            alert("Failed to load projects");
        }
    }

    async function loadDashboard() {
        const projectId = document.getElementById('project-select').value;
        const date = document.getElementById('dash-date').value;
        if (!projectId) return;

        document.getElementById('dashboard-content').innerHTML =
            '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';

        try {
            const [daily, weekly] = await Promise.all([
                getDailyDashboard(projectId, date),
                getWeeklyDashboard(projectId)
            ]);
            renderDashboard(daily, weekly);
        } catch (e) {
            document.getElementById('dashboard-content').innerHTML =
                '<div class="alert alert-error">Failed to load dashboard.</div>';
        }
    }

    function renderDashboard(daily, weekly) {
        document.getElementById('dashboard-content').innerHTML = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value">${daily.total_households}</div>
                <div class="label">Total Houses</div>
            </div>
            <div class="stat-card">
                <div class="value">${daily.collected}</div>
                <div class="label">Collected</div>
            </div>
            <div class="stat-card">
                <div class="value" style="color:#c62828;">${daily.missing}</div>
                <div class="label">Missing</div>
            </div>
            <div class="stat-card">
                <div class="value">${daily.coverage_pct}%</div>
                <div class="label">Coverage</div>
            </div>
        </div>

        <div class="card">
            <h2>Daily Waste Distribution</h2>
            <canvas id="dailyChart"></canvas>
        </div>

        <div class="card">
            <h2>Weekly Trend</h2>
            <canvas id="weeklyChart"></canvas>
        </div>
        `;

        renderDailyChart(daily);
        renderWeeklyChart(weekly);
    }

    function renderDailyChart(daily) {
        const ctx = document.getElementById('dailyChart').getContext('2d');

        const labels = Object.keys(daily.waste_distribution);
        const values = Object.values(daily.waste_distribution);

        const colors = ['#1565c0', '#00695c', '#e65100', '#b71c1c', '#6a1b9a'];

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Waste Count',
                    data: values,
                    backgroundColor: colors
                }]
            },
            options: {
                responsive: true,
                onClick: (e, elements) => {
                    if (elements.length > 0) {
                        const index = elements[0].index;
                        const type = labels[index];
                        const count = values[index];
                        const percent = daily.collected
                            ? ((count / daily.collected) * 100).toFixed(1)
                            : 0;

                        alert(`${type.toUpperCase()}\nCount: ${count}\nPercentage: ${percent}%`);
                    }
                }
            }
        });
    }

    function renderWeeklyChart(weekly) {
        const ctx = document.getElementById('weeklyChart').getContext('2d');

        const labels = weekly.weekly_trend.map(d => d.date);

        const types = ['dry', 'wet', 'mixed', 'hazardous', 'electric'];
        const colors = {
            dry: '#1565c0',
            wet: '#00695c',
            mixed: '#e65100',
            hazardous: '#b71c1c',
            electric: '#6a1b9a'
        };

        const datasets = types.map(type => ({
            label: type,
            data: weekly.weekly_trend.map(d => d.waste_counts[type] || 0),
            backgroundColor: colors[type]
        }));

        new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets },
            options: {
                responsive: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                const total = weekly.weekly_trend[context.dataIndex].total;
                                const value = context.raw;
                                const percent = total ? ((value / total) * 100).toFixed(1) : 0;
                                return `${context.dataset.label}: ${value} (${percent}%)`;
                            }
                        }
                    }
                },
                scales: {
                    x: { stacked: true },
                    y: { stacked: true }
                }
            }
        });
    }

    // 🚀 INIT
    createBackground('green');
    loadProjects();
</script></body>

</html>
