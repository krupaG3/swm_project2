<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWM — Data Entry</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .house-input-big {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 16px;
            border: 2px solid #2e7d32;
            border-radius: 10px;
            width: 100%;
        }

        .waste-btn {
            flex: 1;
            min-width: 80px;
            padding: 16px 8px;
            border-radius: 12px;
            border: 2px solid #ddd;
            background: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }

        .waste-btn .wicon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .waste-btn.dry {
            border-color: #1565c0;
            color: #1565c0;
        }

        .waste-btn.wet {
            border-color: #00695c;
            color: #00695c;
        }

        .waste-btn.mixed {
            border-color: #e65100;
            color: #e65100;
        }

        .waste-btn.hazardous {
            border-color: #b71c1c;
            color: #b71c1c;
        }

        .waste-btn.electric {
            border-color: #6a1b9a;
            color: #6a1b9a;
        }

        .waste-btn.selected.dry {
            background: #1565c0;
            color: white;
        }

        .waste-btn.selected.wet {
            background: #00695c;
            color: white;
        }

        .waste-btn.selected.mixed {
            background: #e65100;
            color: white;
        }

        .waste-btn.selected.hazardous {
            background: #b71c1c;
            color: white;
        }

        .waste-btn.selected.electric {
            background: #6a1b9a;
            color: white;
        }

        .submit-big {
            width: 100%;
            padding: 18px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        .submit-big:disabled {
            background: #ccc;
        }

        .recent-list {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>

<body>
    <div class="bg-animation"></div>

    <div class="navbar">
        <h1>♻️ Waste Entry</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container page-content">
        <div id="alert-box"></div>

        <div class="card">
            <div class="form-group">
                <label>Project</label>
                <select id="project-select"
                    style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:16px;">
                    <option value="">-- Select Project --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="entry-date"
                    style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:16px;">
            </div>
        </div>

        <div class="card">
            <h2>🏠 House Number</h2>
            <input type="text" id="house-id-input" class="house-input-big" placeholder="e.g. S123" autocomplete="off"
                autocorrect="off" autocapitalize="characters">
                <div id="house-error" style="color:#c62828;font-size:13px;margin-top:4px;display:none;"></div>
            <p style="text-align:center;font-size:12px;color:#9e9e9e;margin-top:8px;">
                Type the number from the household/bucket
            </p>
        </div>

        <div class="card">
            <h2>🗑️ Waste Type</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="waste-btn dry" onclick="toggleWaste(this,'dry')">
                    <span class="wicon">🟦</span>Dry
                </button>
                <button class="waste-btn wet" onclick="toggleWaste(this,'wet')">
                    <span class="wicon">🟩</span>Wet
                </button>
                <button class="waste-btn mixed" onclick="toggleWaste(this,'mixed')">
                    <span class="wicon">🟧</span>Mixed
                </button>
                <button class="waste-btn hazardous" onclick="toggleWaste(this,'hazardous')">
                    <span class="wicon">🟥</span>Hazardous
                </button>
                <button class="waste-btn electric" onclick="toggleWaste(this,'electric')">
                    <span class="wicon">🟪</span>Electric
                </button>
            </div>
        </div>

        <button class="submit-big" id="submit-btn" onclick="submitEntry()">
            ✅ SUBMIT
        </button>
        <button class="btn btn-primary" onclick="confirmDownload()">
            📥 Download Today's Data
        </button>

    </div>

    <nav class="bottom-nav">
        <a href="collection.html" class="active">
            <span class="nav-icon">📝</span>Entry
        </a>
        <a href="missing.html">
            <span class="nav-icon">⚠️</span>Missing
        </a>
        <a href="dashboard.html">
            <span class="nav-icon">📊</span>Dashboard
        </a>
    </nav>

<script src="../js/api.js"></script>
<script>
    // 🔐 Auth check
    const user = getUser();
    if (!getToken() || !user) {
        window.location.href = 'login.html';
    }

    // 🎨 Background function (ADDED)
    function createBackground(theme = 'green') {
        const container = document.querySelector('.bg-animation');
        if (!container) return;

        const icons = ['♻️', '🗑️', '🌱', '🌍', '💚', '🏠', '⚠️'];

        const colors = {
            green: '#2e7d32',
            orange: '#f57c00'
        };

        for (let i = 0; i < 20; i++) {
            const span = document.createElement('span');
            span.innerText = icons[Math.floor(Math.random() * icons.length)];

            span.style.left = Math.random() * 100 + 'vw';
            span.style.animationDuration = (8 + Math.random() * 5) + 's';
            span.style.fontSize = (18 + Math.random() * 20) + 'px';
            span.style.color = colors[theme];

            container.appendChild(span);
        }
    }

    let selectedWasteTypes = [];
    let recentEntries = [];

    document.getElementById('entry-date').value =
        new Date().toISOString().split('T')[0];

    // Load projects
    async function loadProjects() {
        try {
            const projects = await getProjects();
            const sel = document.getElementById('project-select');

            // Preserve selected value (if any)
            const selectedValue = sel.value;

            // Reset dropdown
            sel.innerHTML = '<option value="">-- Select Project --</option>';

            projects.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = p.name;

                // Restore selected value
                if (p.id == selectedValue) {
                    option.selected = true;
                }

                sel.appendChild(option);
            });

            // Auto select if only one project
            if (projects.length === 1) {
                sel.value = projects[0].id;
            }

        } catch (err) {
            console.error(err);
            alert("Failed to load projects");
        }
    }
    function toggleWaste(btn, type) {
        btn.classList.toggle('selected');
        if (btn.classList.contains('selected')) {
            selectedWasteTypes.push(type);
        } else {
            selectedWasteTypes = selectedWasteTypes.filter(t => t !== type);
        }
    }

    function showAlert(msg, type = 'info') {
        const box = document.getElementById('alert-box');
        box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        setTimeout(() => box.innerHTML = '', 3000);
    }

    function resetForm() {
        const input = document.getElementById('house-id-input');

        input.value = '';
        selectedWasteTypes = [];

        document.querySelectorAll('.waste-btn').forEach(b => {
            b.classList.remove('selected');
        });

        input.focus();

        input.style.border = '2px solid #2e7d32';
        input.style.boxShadow = '0 0 8px #2e7d32';

        setTimeout(() => {
            input.style.border = '';
            input.style.boxShadow = '';
        }, 500);
    }

    async function submitEntry() {
        const projectId = document.getElementById('project-select').value;
        const houseId = document.getElementById('house-id-input').value.trim().toUpperCase();
        const entryDate = document.getElementById('entry-date').value;
        const btn = document.getElementById('submit-btn');

        if (!projectId) return showAlert('Please select a project.', 'error');
        if (!houseId) return showAlert('Please enter the house number.', 'error');
        if (!selectedWasteTypes.length) return showAlert('Please select waste type.', 'error');

        // ✅ Set loading state
        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
            await apiFetch('/collections/', {
                method: 'POST',
                body: JSON.stringify({
                    project: projectId,
                    house_id: houseId,
                    date: entryDate,
                    waste_types: selectedWasteTypes,
                }),
            });

            // ✅ SUCCESS
            showAlert(`✅ Saved: ${houseId}`, 'success');
            resetForm();

            document.getElementById('house-error').style.display = 'none';

            btn.textContent = '✅ Saved!';
            setTimeout(() => {
                btn.textContent = '✅ SUBMIT';
            }, 800);

        } catch (err) {
            const input = document.getElementById('house-id-input');
            const errorBox = document.getElementById('house-error');

            let message = "Something went wrong";

            if (err.detail) message = err.detail;
            else if (err.error) message = err.error;
            else if (err.duplicate) message = `House ${houseId} already submitted today!`;

            // ❌ Show inline error
            errorBox.innerText = message;
            errorBox.style.display = 'block';

            // 🔥 FORCE SHAKE (FIXED)
            input.classList.remove('input-error'); // reset first
            void input.offsetWidth; // force reflow
            input.classList.add('input-error');

        } finally {
            // ✅ ALWAYS RESET BUTTON (FIXED)
            btn.disabled = false;
            btn.textContent = '✅ SUBMIT';
        }
    }
    function confirmDownload() {
        if (confirm("Are you sure you want to download today's data?")) {
            downloadTodayData();
        }
    }

    async function downloadTodayData() {
        const projectId = document.getElementById('project-select').value;
        let date = document.getElementById('entry-date').value;

        // ✅ fallback to today if empty
        if (!date) {
            date = new Date().toISOString().split('T')[0];
        }

        if (!projectId) return alert("Please select a project first.");

        try {
            const data = await getDailyCollections(projectId, date);

            if (!data.length) return alert("No data available for today.");

            let csv = "S.No,Date,HH Number,Waste Type,Entered By\n";

            data.forEach((item, index) => {
                const wasteTypes = item.waste_types.join('|');
                const enteredBy = item.collected_by_name || 'Unknown';
                const houseId = item.house_id || item.household?.house_id;

                csv += `${index + 1},${item.date},${houseId},${wasteTypes},${enteredBy}\n`;
            });

            downloadCSV(csv, `collected_${date}.csv`);

        } catch (err) {
            alert("Failed to download data.");
            console.error(err);
        }
    }

    function downloadCSV(csvContent, filename) {
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = window.URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = filename;

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        window.URL.revokeObjectURL(url);
    }

    document.getElementById('house-id-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submitEntry();
    });

    document.getElementById('house-id-input').addEventListener('input', () => {
        document.getElementById('house-error').style.display = 'none';
    });

    // 🚀 INIT
    createBackground('green');
    loadProjects();
</script></body>

</html>
