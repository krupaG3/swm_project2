<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWM — Data Entry</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .house-input-big {
            font-size: 24px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 16px;
            border: 2px solid #2e7d32;
            border-radius: 10px;
            width: 100%;
        }

        .waste-btn {
            flex: 1;
            min-width: 80px;
            padding: 16px 8px;
            border-radius: 12px;
            border: 2px solid #ddd;
            background: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }

        .waste-btn .wicon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        .waste-btn.dry {
            border-color: #1565c0;
            color: #1565c0;
        }

        .waste-btn.wet {
            border-color: #00695c;
            color: #00695c;
        }

        .waste-btn.mixed {
            border-color: #e65100;
            color: #e65100;
        }

        .waste-btn.hazardous {
            border-color: #b71c1c;
            color: #b71c1c;
        }

        .waste-btn.electric {
            border-color: #6a1b9a;
            color: #6a1b9a;
        }

        .waste-btn.selected.dry {
            background: #1565c0;
            color: white;
        }

        .waste-btn.selected.wet {
            background: #00695c;
            color: white;
        }

        .waste-btn.selected.mixed {
            background: #e65100;
            color: white;
        }

        .waste-btn.selected.hazardous {
            background: #b71c1c;
            color: white;
        }

        .waste-btn.selected.electric {
            background: #6a1b9a;
            color: white;
        }

        .submit-big {
            width: 100%;
            padding: 18px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }

        .submit-big:disabled {
            background: #ccc;
        }

        .recent-list {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1>♻️ Waste Entry</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="container page-content">
        <div id="alert-box"></div>

        <div class="card">
            <div class="form-group">
                <label>Project</label>
                <select id="project-select"
                    style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:16px;">
                    <option value="">-- Select Project --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="entry-date"
                    style="width:100%;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:16px;">
            </div>
        </div>

        <div class="card">
            <h2>🏠 House Number</h2>
            <input type="text" id="house-id-input" class="house-input-big" placeholder="e.g. S123" autocomplete="off"
                autocorrect="off" autocapitalize="characters">
            <p style="text-align:center;font-size:12px;color:#9e9e9e;margin-top:8px;">
                Type the number from the household/bucket
            </p>
        </div>

        <div class="card">
            <h2>🗑️ Waste Type</h2>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="waste-btn dry" onclick="toggleWaste(this,'dry')">
                    <span class="wicon">🟦</span>Dry
                </button>
                <button class="waste-btn wet" onclick="toggleWaste(this,'wet')">
                    <span class="wicon">🟩</span>Wet
                </button>
                <button class="waste-btn mixed" onclick="toggleWaste(this,'mixed')">
                    <span class="wicon">🟧</span>Mixed
                </button>
                <button class="waste-btn hazardous" onclick="toggleWaste(this,'hazardous')">
                    <span class="wicon">🟥</span>Hazardous
                </button>
                <button class="waste-btn electric" onclick="toggleWaste(this,'electric')">
                    <span class="wicon">🟪</span>Electric
                </button>
            </div>
        </div>

        <button class="submit-big" id="submit-btn" onclick="submitEntry()">
            ✅ SUBMIT
        </button>

        <!-- Recent entries today -->
        <div class="card" style="margin-top:16px;">
            <h2>📋 Today's Entries <span id="entry-count" style="font-size:13px;color:#9e9e9e;"></span></h2>
            <div class="recent-list" id="recent-entries">
                <p style="color:#9e9e9e;font-size:14px;text-align:center;padding:16px;">
                    No entries yet today
                </p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="collection.html" class="active">
            <span class="nav-icon">📝</span>Entry
        </a>
        <a href="missing.html">
            <span class="nav-icon">⚠️</span>Missing
        </a>
        <a href="dashboard.html">
            <span class="nav-icon">📊</span>Dashboard
        </a>
    </nav>

    <script src="../js/api.js"></script>
    <script>
        if (!getToken()) window.location.href = 'login.html';

        let selectedWasteTypes = [];
        let recentEntries = [];

        document.getElementById('entry-date').value = new Date().toISOString().split('T')[0];

        // Load projects on page load
        async function loadProjects() {
            const projects = await getProjects();
            const sel = document.getElementById('project-select');
            projects.forEach(p => {
                sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
            // Auto select first project
            if (projects.length === 1) {
                sel.value = projects[0].id;
            }
        }

        function toggleWaste(btn, type) {
            btn.classList.toggle('selected');
            if (btn.classList.contains('selected')) {
                selectedWasteTypes.push(type);
            } else {
                selectedWasteTypes = selectedWasteTypes.filter(t => t !== type);
            }
        }

        function showAlert(msg, type = 'info') {
            const box = document.getElementById('alert-box');
            box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => box.innerHTML = '', 3000);
        }

        function resetForm() {
            document.getElementById('house-id-input').value = '';
            selectedWasteTypes = [];
            document.querySelectorAll('.waste-btn').forEach(b => b.classList.remove('selected'));
            document.getElementById('house-id-input').focus();
        }

        function addToRecentList(houseId, wasteTypes) {
            const now = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
            recentEntries.unshift({ houseId, wasteTypes, time: now });
            if (recentEntries.length > 20) recentEntries.pop();

            document.getElementById('entry-count').textContent =
                `(${recentEntries.length} today)`;

            document.getElementById('recent-entries').innerHTML = recentEntries.map(e => `
            <div style="display:flex;justify-content:space-between;
                        align-items:center;padding:10px 0;
                        border-bottom:1px solid #f0f0f0;">
                <div>
                    <span style="font-weight:700;color:#1b5e20;font-size:16px;">
                        ${e.houseId}
                    </span>
                    <span style="font-size:12px;color:#9e9e9e;margin-left:8px;">
                        ${e.time}
                    </span>
                    <div style="font-size:12px;color:#555;margin-top:2px;">
                        ${e.wasteTypes.join(', ')}
                    </div>
                </div>
                <span style="color:#2e7d32;font-size:18px;">✅</span>
            </div>
        `).join('');
        }

        async function submitEntry() {
            const projectId = document.getElementById('project-select').value;
            const houseId = document.getElementById('house-id-input').value.trim().toUpperCase();
            const entryDate = document.getElementById('entry-date').value;
            const btn = document.getElementById('submit-btn');

            if (!projectId) return showAlert('Please select a project.', 'error');
            if (!houseId) return showAlert('Please enter the house number.', 'error');
            if (!selectedWasteTypes.length) return showAlert('Please select waste type.', 'error');

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await apiFetch('/collections/', {
                    method: 'POST',
                    body: JSON.stringify({
                        project: projectId,
                        house_id: houseId,
                        date: entryDate,
                        waste_types: selectedWasteTypes,
                    }),
                });

                showAlert(`✅ ${res.message}`, 'success');
                addToRecentList(houseId, selectedWasteTypes);
                resetForm();

            } catch (err) {
                if (err.duplicate) {
                    showAlert(`⚠️ House ${houseId} already submitted today!`, 'warning');
                } else {
                    showAlert(`❌ ${err.error || 'Something went wrong.'}`, 'error');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = '✅ SUBMIT';
            }
        }

        // Allow Enter key to submit
        document.getElementById('house-id-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitEntry();
        });

        loadProjects();
    </script>
</body>

</html>
