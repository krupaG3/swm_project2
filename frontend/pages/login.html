<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWM — Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-logo">
            <div class="icon">♻️</div>
            <h1>SWM System</h1>
            <p>Solid Waste Management</p>
        </div>

        <div class="login-card">
            <div id="alert-box"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
            </div>

            <button class="btn btn-primary" id="login-btn" onclick="doLogin()">
                Login
            </button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        // If already logged in, redirect
        if (getToken()) {
            const user = getUser();
            if (user) redirectByRole(user.role);
        }

        function redirectByRole(role) {
            if (role === 'field_worker') {
                window.location.href = 'collection.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const alertBox = document.getElementById('alert-box');

            if (!username || !password) {
                alertBox.innerHTML = '<div class="alert alert-error">Please enter username and password.</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            alertBox.innerHTML = '';

            try {
                const user = await login(username, password);
                alertBox.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
                setTimeout(() => redirectByRole(user.role), 800);
            } catch (err) {
                alertBox.innerHTML = '<div class="alert alert-error">Invalid username or password.</div>';
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        // Allow Enter key to login
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>

</html>
